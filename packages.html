<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Travel Packages</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- Hero Section with CTA Button -->
    <section id="hero">
        <h2>Explore Our Amazing Travel Packages</h2>
    </section>

    <!-- Packages Section -->
    <section id="packages">
        <h1>Our Travel Packages</h1>
        <div class="package-list">
            
            <!-- Beach Vacation Package -->
            <div class="package">
                <img src="images/beach.jpeg" alt="Beach Vacation">
                <h3>Beach Vacation</h3>
                <p>Enjoy a relaxing beach vacation with all-inclusive amenities. Perfect for a peaceful getaway.</p>
                <a href="https://www.tripadvisor.com/TravelersChoice-Beaches" class="cta-button" target="_blank">Learn More</a>
            </div>

            <!-- Mountain Adventure Package -->
            <div class="package">
                <img src="images/mountain.jpg" alt="Mountain Adventure">
                <h3>Mountain Adventure</h3>
                <p>Discover the thrill of mountain trekking and nature. Perfect for adventure seekers.</p>
                <a href="https://www.nationalgeographic.com/travel/article/best-mountain-trips" class="cta-button" target="_blank">Learn More</a>
            </div>

        </div>
    </section>

</body>
</html>
